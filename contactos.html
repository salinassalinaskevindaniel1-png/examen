<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Software News</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #3e566e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .contact-container {
            background-color: #fff;
            width: 90%;
            max-width: 1000px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .contact-info {
            background-color: #2c3e50;
            color: #fff;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .contact-info h2 {
            margin-bottom: 20px;
            font-size: 28px;
            color: #e74c3c;
        }

        .contact-info p {
            line-height: 1.6;
            opacity: 0.8;
        }

        .info-details {
            margin-top: 30px;
        }

        .info-item {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .info-item span {
            margin-left: 15px;
            font-size: 16px;
        }

        .contact-form {
            padding: 40px;
        }

        .contact-form h2 {
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 14px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: #e74c3c;
        }

        .submit-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background-color: #c0392b;
        }

        @media (max-width: 768px) {
            .contact-container {
                grid-template-columns: 1fr;
            }
            .contact-info {
                padding: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="contact-container">
        <div class="contact-info">
            <h2>Ponte en contacto</h2>
            <p>¿Tienes dudas sobre licencias de software o soporte técnico? Nuestro equipo de expertos está listo para ayudarte.</p>
            
            <div class="info-details">
                <div class="info-item">
                    <strong>DIRECCION:</strong>
                    <span>Av. Tecnológica 123, Ciudad Software</span>
                </div>
                <div class="info-item">
                    <strong>CONTACTO:</strong>
                    <span>+591 9999999</span>
                </div>
                <div class="info-item">
                    <strong>GMAIL:</strong>
                    <span>soporte@softwarenews.com</span>
                </div>
            </div>
        </div>

        <div class="contact-form">
            <h2>Envíanos un mensaje</h2>
            <form action="#">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" placeholder="Tu nombre..." required>
                </div>
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" placeholder="email@ejemplo.com" required>
                </div>
                <div class="form-group">
                    <label>Asunto</label>
                    <input type="text" placeholder="¿En qué podemos ayudarte?">
                </div>
                <div class="form-group">
                    <label>Mensaje</label>
                    <textarea rows="4" placeholder="Escribe tu mensaje aquí..."></textarea>
                </div>
                <button type="submit" class="submit-btn">Enviar Formulario</button>
            </form>
        </div>
    </div>

</body>
</html>
